name: TEST Windows Arm64 prebuilt (throwaway)

# Temporary workflow to validate the aarch64-pc-windows-msvc build + smoke
# test on a native windows-11-arm runner, WITHOUT cutting a release. Mirrors
# the build-windows job in release-prebuilt.yml for the arm64 target only.
# Delete this file once the build is confirmed green.

on:
  workflow_dispatch:
  push:
    branches: [ winarm-prebuild ]

jobs:
  build-winarm:
    name: Windows aarch64-pc-windows-msvc (native)
    runs-on: windows-11-arm
    env:
      TARGET: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - name: Set up MSVC developer environment
        shell: pwsh
        run: |
          $arch = 'arm64'
          $hostArch = 'arm64'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $before = @{}
          Get-ChildItem env: | ForEach-Object { $before[$_.Name] = $_.Value }
          Import-Module (Join-Path $vsPath 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=$arch -host_arch=$hostArch -no_logo"
          Get-ChildItem env: | ForEach-Object {
            if ($before[$_.Name] -ne $_.Value) {
              "$($_.Name)=$($_.Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }
      - run: cargo build --release --target aarch64-pc-windows-msvc
      - name: Merge static libs into single archive
        shell: bash
        run: |
          set -euo pipefail
          builddir=$(ls -d target/aarch64-pc-windows-msvc/release/build/libchdman-rs-*/out | head -1)
          mkdir -p out
          name="libchdman_rs-aarch64-pc-windows-msvc.lib"
          inputs=()
          for f in "$builddir"/*.lib; do
            inputs+=("$f")
          done
          lib.exe -OUT:"out/$name" "${inputs[@]}"
          (cd out && sha256sum "$name" > "$name.sha256")
      - name: Validate archive
        shell: bash
        run: scripts/validate-archive.sh "out/libchdman_rs-aarch64-pc-windows-msvc.lib"
      - name: Smoke test — link prebuilt and run example
        env:
          LIBCHDMAN_PREBUILT_LOCAL_ARCHIVE: ${{ github.workspace }}\out\libchdman_rs-aarch64-pc-windows-msvc.lib
        run: |
          if (Test-Path "target/aarch64-pc-windows-msvc/release/examples") {
            Remove-Item -Recurse -Force "target/aarch64-pc-windows-msvc/release/examples"
          }
          cargo run --release --features prebuilt --target aarch64-pc-windows-msvc --example check-prebuilt
