name: Build prebuilt static archives

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create on successful build (e.g. v0.287.0-l4). Must NOT already exist; must match Cargo.toml version.'
        required: true

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Validate tag and version
        id: check
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$INPUT_TAG"
          if [[ ! "$tag" =~ ^v ]]; then
            echo "FAIL: tag '$tag' must start with 'v'"
            exit 1
          fi
          expected_version="${tag#v}"
          actual_version=$(grep -E '^version = ' Cargo.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          if [[ "$expected_version" != "$actual_version" ]]; then
            echo "FAIL: Cargo.toml version is '$actual_version' but requested tag is '$tag' (expected version '$expected_version')"
            echo "Bump Cargo.toml to match the tag you intend to publish."
            exit 1
          fi
          if git ls-remote --tags --exit-code origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "FAIL: tag '$tag' already exists on origin"
            echo "If you need to rebuild this release, delete the tag and release first, or use a new tag."
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "FAIL: GitHub Release '$tag' already exists"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "OK: tag '$tag' is free; Cargo.toml version matches."

  build-linux:
    needs: preflight
    name: Linux ${{ matrix.target }} / ${{ matrix.glibc }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc2.31 floor (ubuntu-20.04) was dropped: the runner is being
          # retired and was queueing indefinitely. Bottom supported floor
          # is now 2.35 (Ubuntu 22.04 / Debian 12 / RHEL 9).
          - target: x86_64-unknown-linux-gnu
            glibc: glibc2.35
            runs_on: ubuntu-22.04
          - target: x86_64-unknown-linux-gnu
            glibc: glibc2.39
            runs_on: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            glibc: glibc2.35
            runs_on: ubuntu-22.04-arm
          - target: aarch64-unknown-linux-gnu
            glibc: glibc2.39
            runs_on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Merge static libs into single archive
        shell: bash
        run: |
          set -euo pipefail
          builddir=$(ls -d target/${{ matrix.target }}/release/build/libchdman-rs-*/out | head -1)
          if [ -z "${builddir:-}" ]; then
            echo "ERROR: build output dir not found"
            find target/${{ matrix.target }}/release/build -maxdepth 3 -type d || true
            exit 1
          fi
          echo "Found build output at: $builddir"
          mkdir -p out
          name="libchdman_rs-${{ matrix.target }}-${{ matrix.glibc }}.a"
          script=$(mktemp)
          {
            echo "create out/$name"
            for f in "$builddir"/lib*.a; do
              echo "addlib $f"
            done
            echo "save"
            echo "end"
          } > "$script"
          ar -M < "$script"
          ranlib "out/$name" || true
          (cd out && shasum -a 256 "$name" > "$name.sha256")
      - name: Validate archive
        run: scripts/validate-archive.sh "out/libchdman_rs-${{ matrix.target }}-${{ matrix.glibc }}.a"
      - name: Smoke test — link prebuilt and run example
        env:
          LIBCHDMAN_PREBUILT_LOCAL_ARCHIVE: ${{ github.workspace }}/out/libchdman_rs-${{ matrix.target }}-${{ matrix.glibc }}.a
        run: |
          rm -rf target/${{ matrix.target }}/release/examples
          cargo run --release --features prebuilt --target ${{ matrix.target }} --example check-prebuilt
      - uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.target }}-${{ matrix.glibc }}
          path: out/*

  build-macos:
    needs: preflight
    name: macOS ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-15-intel is GitHub's current Intel macOS image. If the
          # label is rejected ("no runner matches"), switch this to
          # cross-compile from macos-latest via `--target x86_64-apple-darwin`.
          - target: x86_64-apple-darwin
            runs_on: macos-15-intel
          - target: aarch64-apple-darwin
            runs_on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: '10.13'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Merge static libs into single archive
        run: |
          set -euo pipefail
          builddir=$(ls -d target/${{ matrix.target }}/release/build/libchdman-rs-*/out | head -1)
          mkdir -p out
          name="libchdman_rs-${{ matrix.target }}.a"
          libtool -static -o "out/$name" "$builddir"/lib*.a
          (cd out && shasum -a 256 "$name" > "$name.sha256")
      - name: Validate archive
        run: scripts/validate-archive.sh "out/libchdman_rs-${{ matrix.target }}.a"
      - name: Smoke test — link prebuilt and run example
        env:
          LIBCHDMAN_PREBUILT_LOCAL_ARCHIVE: ${{ github.workspace }}/out/libchdman_rs-${{ matrix.target }}.a
        run: |
          rm -rf target/${{ matrix.target }}/release/examples
          cargo run --release --features prebuilt --target ${{ matrix.target }} --example check-prebuilt
      - uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.target }}
          path: out/*

  build-windows:
    needs: preflight
    name: Windows ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runs_on: windows-latest
            vs_arch: x64
            vs_host_arch: x64
          - target: i686-pc-windows-msvc
            runs_on: windows-latest
            vs_arch: x86
            vs_host_arch: x64
          # Native Arm64 runner (GitHub-hosted, free for public repos, GA
          # since 2025-08). The Arm64 host's default rustup toolchain is
          # aarch64-pc-windows-msvc, so this builds and smoke-tests natively
          # rather than cross-compiling.
          - target: aarch64-pc-windows-msvc
            runs_on: windows-11-arm
            vs_arch: arm64
            vs_host_arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Set up the MSVC developer environment without a third-party action.
      # We previously used ilammy/msvc-dev-cmd (node20, deprecated) and tried
      # the ckormanyos fork (node24 but it doesn't vendor node_modules, so it
      # crashes with "Cannot find module '@actions/core'"). Instead, drive
      # Microsoft's own Microsoft.VisualStudio.DevShell.dll (preinstalled on
      # windows-latest) via Enter-VsDevShell and persist the resulting env to
      # $GITHUB_ENV. This puts MSVC's cl.exe/lib.exe (and its link.exe, ahead
      # of Git's coreutils link.exe) on PATH for later steps. No node runtime,
      # so no Node deprecation warnings.
      - name: Set up MSVC developer environment
        shell: pwsh
        run: |
          $arch = '${{ matrix.vs_arch }}'
          $hostArch = '${{ matrix.vs_host_arch }}'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $before = @{}
          Get-ChildItem env: | ForEach-Object { $before[$_.Name] = $_.Value }
          Import-Module (Join-Path $vsPath 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=$arch -host_arch=$hostArch -no_logo"
          # Export only the variables Enter-VsDevShell added or changed.
          Get-ChildItem env: | ForEach-Object {
            if ($before[$_.Name] -ne $_.Value) {
              "$($_.Name)=$($_.Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Merge static libs into single archive
        shell: bash
        run: |
          set -euo pipefail
          builddir=$(ls -d target/${{ matrix.target }}/release/build/libchdman-rs-*/out | head -1)
          mkdir -p out
          name="libchdman_rs-${{ matrix.target }}.lib"
          inputs=()
          for f in "$builddir"/*.lib; do
            inputs+=("$f")
          done
          # lib.exe accepts /OUT:... and -OUT:... interchangeably; we use the
          # dash form so MSYS bash doesn't mangle the leading slash into a
          # Windows path. Same applies if more flags are added later.
          lib.exe -OUT:"out/$name" "${inputs[@]}"
          (cd out && sha256sum "$name" > "$name.sha256")
      - name: Validate archive
        shell: bash
        run: scripts/validate-archive.sh "out/libchdman_rs-${{ matrix.target }}.lib"
      - name: Smoke test — link prebuilt and run example
        # Default to pwsh (no `shell: bash`). Under MSYS bash, PATH puts
        # Git's coreutils `link.exe` (a hardlink creator) ahead of MSVC's
        # linker, so cargo's host-arch compile of proc-macro crates fails
        # with /usr/bin/link: extra operand ...
        env:
          LIBCHDMAN_PREBUILT_LOCAL_ARCHIVE: ${{ github.workspace }}\out\libchdman_rs-${{ matrix.target }}.lib
        run: |
          if (Test-Path "target/${{ matrix.target }}/release/examples") {
            Remove-Item -Recurse -Force "target/${{ matrix.target }}/release/examples"
          }
          cargo run --release --features prebuilt --target ${{ matrix.target }} --example check-prebuilt
      - uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.target }}
          path: out/*

  build-linux-armv7:
    needs: preflight
    name: Linux armv7-unknown-linux-gnueabihf / glibc2.31
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      # Install before checkout: actions/checkout needs git, and the
      # arm cross-toolchain in ubuntu:20.04 ships with a glibc 2.31
      # sysroot — the right floor for MiSTer (Cortex-A9 / glibc 2.31).
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl ca-certificates git file \
            gcc g++ \
            gcc-10-arm-linux-gnueabihf g++-10-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf
          # Provide unversioned symlinks so cc-rs and other build scripts
          # that look up arm-linux-gnueabihf-gcc find the GCC 10 binary.
          ln -sf /usr/bin/arm-linux-gnueabihf-gcc-10 /usr/bin/arm-linux-gnueabihf-gcc
          ln -sf /usr/bin/arm-linux-gnueabihf-g++-10 /usr/bin/arm-linux-gnueabihf-g++
      # The GH Actions runner sets HOME=/github/home inside containers, but
      # the container user is root (home /root). rustup rejects that mismatch.
      - name: Fix HOME for root user in container
        run: echo "HOME=/root" >> "$GITHUB_ENV"
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-gnueabihf
      - name: Configure Cargo linker
        run: |
          mkdir -p .cargo
          printf '[target.armv7-unknown-linux-gnueabihf]\nlinker = "arm-linux-gnueabihf-gcc-10"\n' \
            > .cargo/config.toml
      - name: Build
        env:
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc-10
          CXX_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-g++-10
          AR_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-ar
        run: cargo build --release --target armv7-unknown-linux-gnueabihf
      - name: Merge static libs into single archive
        shell: bash
        run: |
          set -euo pipefail
          builddir=$(ls -d target/armv7-unknown-linux-gnueabihf/release/build/libchdman-rs-*/out | head -1)
          if [ -z "${builddir:-}" ]; then
            echo "ERROR: build output dir not found"
            find target/armv7-unknown-linux-gnueabihf/release/build -maxdepth 3 -type d || true
            exit 1
          fi
          echo "Found build output at: $builddir"
          mkdir -p out
          name="libchdman_rs-armv7-unknown-linux-gnueabihf-glibc2.31.a"
          script=$(mktemp)
          {
            echo "create out/$name"
            for f in "$builddir"/lib*.a; do
              echo "addlib $f"
            done
            echo "save"
            echo "end"
          } > "$script"
          ar -M < "$script"
          ranlib "out/$name" || true
          (cd out && sha256sum "$name" > "$name.sha256")
      - name: Validate archive
        run: scripts/validate-archive.sh "out/libchdman_rs-armv7-unknown-linux-gnueabihf-glibc2.31.a"
      - name: Smoke test — link prebuilt and build example
        # armv7 binaries cannot execute on the x86_64 host; build only.
        env:
          LIBCHDMAN_PREBUILT_LOCAL_ARCHIVE: ${{ github.workspace }}/out/libchdman_rs-armv7-unknown-linux-gnueabihf-glibc2.31.a
        run: |
          rm -rf target/armv7-unknown-linux-gnueabihf/release/examples
          cargo build --release --features prebuilt --target armv7-unknown-linux-gnueabihf --example check-prebuilt
      - uses: actions/upload-artifact@v7
        with:
          name: linux-armv7-unknown-linux-gnueabihf-glibc2.31
          path: out/*

  build-linux-riscv64:
    needs: preflight
    name: Linux riscv64gc-unknown-linux-gnu / ${{ matrix.glibc }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        # No native RISC-V runner exists, so cross-compile. The glibc floor of
        # the produced archive is set by the build host's cross-sysroot, which
        # tracks the runner's Ubuntu release — so map each floor to the GitHub
        # runner that provides it (same images the x86_64/aarch64 jobs use).
        # build.rs already routes riscv64 through the LIBCHDMAN_GLIBC logic
        # (auto -> 2.35), so both floors are consumable without a code change.
        include:
          - glibc: glibc2.35
            runs_on: ubuntu-22.04
          - glibc: glibc2.39
            runs_on: ubuntu-24.04
    steps:
      - name: Install RISC-V cross toolchain
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu binutils-riscv64-linux-gnu
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv64gc-unknown-linux-gnu
      - name: Configure Cargo linker
        run: |
          mkdir -p .cargo
          printf '[target.riscv64gc-unknown-linux-gnu]\nlinker = "riscv64-linux-gnu-gcc"\n' \
            > .cargo/config.toml
      - name: Build
        env:
          CC_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-gcc
          CXX_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-g++
          AR_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-ar
        run: cargo build --release --target riscv64gc-unknown-linux-gnu
      - name: Merge static libs into single archive
        shell: bash
        run: |
          set -euo pipefail
          builddir=$(ls -d target/riscv64gc-unknown-linux-gnu/release/build/libchdman-rs-*/out | head -1)
          if [ -z "${builddir:-}" ]; then
            echo "ERROR: build output dir not found"
            find target/riscv64gc-unknown-linux-gnu/release/build -maxdepth 3 -type d || true
            exit 1
          fi
          echo "Found build output at: $builddir"
          mkdir -p out
          name="libchdman_rs-riscv64gc-unknown-linux-gnu-${{ matrix.glibc }}.a"
          script=$(mktemp)
          {
            echo "create out/$name"
            for f in "$builddir"/lib*.a; do
              echo "addlib $f"
            done
            echo "save"
            echo "end"
          } > "$script"
          ar -M < "$script"
          ranlib "out/$name" || true
          (cd out && sha256sum "$name" > "$name.sha256")
      - name: Validate archive
        run: scripts/validate-archive.sh "out/libchdman_rs-riscv64gc-unknown-linux-gnu-${{ matrix.glibc }}.a"
      - name: Smoke test — link prebuilt and build example
        # riscv64 binaries cannot execute on the x86_64 host; build only.
        env:
          LIBCHDMAN_PREBUILT_LOCAL_ARCHIVE: ${{ github.workspace }}/out/libchdman_rs-riscv64gc-unknown-linux-gnu-${{ matrix.glibc }}.a
        run: |
          rm -rf target/riscv64gc-unknown-linux-gnu/release/examples
          cargo build --release --features prebuilt --target riscv64gc-unknown-linux-gnu --example check-prebuilt
      - uses: actions/upload-artifact@v7
        with:
          name: linux-riscv64gc-unknown-linux-gnu-${{ matrix.glibc }}
          path: out/*

  release:
    needs: [preflight, build-linux, build-linux-armv7, build-linux-riscv64, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.a' -o -name '*.lib' -o -name '*.sha256' \) -exec cp {} release-assets/ \;
          ls -la release-assets/
      - name: Create release (and tag at this commit)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
